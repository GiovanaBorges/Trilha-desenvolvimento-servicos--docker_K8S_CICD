name: CI

on:
  push:
    branches: ["master"]

  pull_request:
    branches: ["master"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Inicia banco
        working-directory: ./CI-CD
        run: docker compose up -d postgres

      - name: Build
        working-directory: ./CI-CD
        run: go build -v ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          working-directory: ./CI-CD

      - name: Rodar testes
        working-directory: ./CI-CD
        run: DB_HOST=${{ secrets.DB_HOST }} DB_PASSWORD=${{ secrets.DB_PASSWORD }} DB_USER=${{ secrets.DB_USER }} DB_NAME=${{ secrets.DB_NAME }} go test -v ./...

      - name: Build 
        working-directory: ./CI-CD
        run: go build main.go
      
      - name: Projeto compilado
        working-directory: ./CI-CD
        uses: actions/upload-artifact@v4
        with:
          name: projeto-compilado
          path: ./main

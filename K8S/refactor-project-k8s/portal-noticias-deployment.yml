apiVersion: apps/v1
kind: Deployment

metadata:
  name: portal-noticias-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: portal-noticias

  template:
    metadata:
      labels:
        app: portal-noticias

    spec:
      containers:
        - name: portal-noticias-container
          image: aluracursos/portal-noticias:1

          ports:
            - containerPort: 80

          envFrom:
            - configMapRef:
                name: portal-configmap

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            failureThreshold: 3
            initialDelaySeconds: 20

          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            failureThreshold: 5
            initialDelaySeconds: 3